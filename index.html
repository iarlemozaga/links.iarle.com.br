<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Meus Links | Seu Nome</title>
    <link rel="stylesheet" href="style.css">
    <!-- Ícones (Font Awesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Avatar (substitua pelo caminho da sua imagem) -->
        <div class="avatar">
            <img src="avatar.jpg" alt="Avatar">
        </div>

        <!-- Nome e bio -->
        <h1>Seu Nome</h1>
        <p class="bio">Desenvolvedor | Criador de Conteúdo | Tech Enthusiast</p>

        <!-- Links -->
        <div class="links">
            <a href="https://github.com/seuusuario" target="_blank" class="link">
                <i class="fab fa-github"></i> GitHub
            </a>
            <a href="https://linkedin.com/in/seuusuario" target="_blank" class="link">
                <i class="fab fa-linkedin"></i> LinkedIn
            </a>
            <a href="https://twitter.com/seuusuario" target="_blank" class="link">
                <i class="fab fa-twitter"></i> Twitter
            </a>
            <a href="https://instagram.com/seuusuario" target="_blank" class="link">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            <a href="https://seuportifolio.com" target="_blank" class="link">
                <i class="fas fa-briefcase"></i> Portfólio
            </a>
            <a href="mailto:seuemail@exemplo.com" class="link">
                <i class="fas fa-envelope"></i> E-mail
            </a>
        </div>

        <!-- Rodapé opcional -->
        <footer>
            <p>&copy; 2025 Seu Nome. Todos os direitos reservados.</p>
        </footer>
    </div>
</body>
</html>
